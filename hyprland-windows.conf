# ═══════════════════════════════════════════════════════
#   HYPRLAND — GESTIÓN DE VENTANAS (pega esto en tu config)
#   Optimizado para multitasking: cyber + gaming
# ═══════════════════════════════════════════════════════

# ─── GENERAL ─────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(00d4ffcc) rgba(7c3aedcc) 45deg
    col.inactive_border = rgba(1a1c2e88)
    layout = dwindle
    resize_on_border = true
}

# ─── DECORACIÓN (glassmorphism + blur) ───────────────
decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 2
        noise = 0.02
        contrast = 1.1
        brightness = 0.8
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00d4ff22)
        color_inactive = rgba(00000044)
    }
}

# ─── ANIMACIONES ──────────────────────────────────────
animations {
    enabled = true

    bezier = cyberIn,  0.05, 0.9, 0.1, 1.0
    bezier = cyberOut, 0.9, 0.1, 0.1, 1.0
    bezier = smooth,   0.25, 1.0, 0.5, 1.0

    animation = windows,     1, 5,  cyberIn,  slide
    animation = windowsOut,  1, 4,  cyberOut, slide
    animation = border,      1, 8,  smooth
    animation = borderangle, 1, 80, smooth,   loop
    animation = fade,        1, 5,  smooth
    animation = workspaces,  1, 5,  smooth,   slidevert
}

# ─── LAYOUTS ──────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_is_master = false
    new_on_top = false
    mfact = 0.55
}

# ─── KEYBINDS — VENTANAS ──────────────────────────────
# $mod = Super (Windows key)
$mod = SUPER

# Mover foco entre ventanas
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Mover ventanas
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# Resize con teclado
bind = $mod CTRL, h, resizeactive, -40 0
bind = $mod CTRL, l, resizeactive,  40 0
bind = $mod CTRL, k, resizeactive, 0 -40
bind = $mod CTRL, j, resizeactive, 0  40

# Resize con mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Fullscreen / maximize / float
bind = $mod, F,      fullscreen, 0
bind = $mod SHIFT, F, fullscreen, 1   # solo maximizar (sin ocultar bar)
bind = $mod, space,  togglefloating
bind = $mod, P,      pseudo         # dwindle pseudotile

# Split toggle (dwindle)
bind = $mod, S, layoutmsg, togglesplit

# Cerrar ventana
bind = $mod, Q, killactive

# ─── WORKSPACES ───────────────────────────────────────
# Cambiar workspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6

# Mover ventana a workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6

# Workspace especial (scratchpad)
bind = $mod, minus,       togglespecialworkspace, magic
bind = $mod SHIFT, minus, movetoworkspace, special:magic

# Scroll entre workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1
bind = $mod, tab,        workspace, e+1
bind = $mod SHIFT, tab,  workspace, e-1

# ─── APPS RÁPIDAS (ajusta a tus binarios) ─────────────
bind = $mod, Return,     exec, kitty
bind = $mod, E,          exec, thunar
bind = $mod, B,          exec, firefox
bind = $mod SHIFT, D,    exec, discord
bind = $mod, R,          exec, wofi --show drun --style ~/.config/wofi/style.css

# Capturas
bind = ,      Print, exec, grim ~/Screenshots/$(date +%F_%T).png
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Screenshots/$(date +%F_%T).png

# ─── CYBERSEG SHORTCUTS ───────────────────────────────
bind = $mod CTRL, N, exec, kitty --title 'Network Monitor' -e nmtui
bind = $mod CTRL, T, exec, kitty --title 'htop' -e btop
bind = $mod CTRL, W, exec, kitty --title 'Wireshark CLI' -e tshark
bind = $mod CTRL, S, exec, kitty --title 'nmap' -e bash -c "echo 'nmap listo'; bash"

# ─── WINDOW RULES ─────────────────────────────────────
# Float apps de sistema
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, title:^(Network Monitor)$
windowrulev2 = float, title:^(htop)$
windowrulev2 = float, title:^(nmap)$
windowrulev2 = size 900 600, title:^(Network Monitor)$
windowrulev2 = size 1200 700, title:^(htop)$
windowrulev2 = center, title:^(Network Monitor)$
windowrulev2 = center, title:^(htop)$

# Opacidad en terminales flotantes
windowrulev2 = opacity 0.95, class:^(kitty)$

# Gaming: fullscreen, sin dim, sin animaciones
windowrulev2 = fullscreen, class:^(steam_app_.*)$
windowrulev2 = nofocus, class:^(steam_app_.*)$, title:^()$
windowrulev2 = immediate, class:^(steam_app_.*)$
